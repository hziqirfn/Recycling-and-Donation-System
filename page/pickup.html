<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTeM RecycleHub</title>
    <link rel="stylesheet" href="./style/pickup.css">
</head>
<body>
    <h2>Request Pickup</h2>
    <p>Schedule a collection for your items</p>
    <div id="container">
        <form action="schedulePickup" method="post" enctype="multipart/form-data">
            <label>Select Item: </label><br>
            <input type="text" name="itemName" required><br>
            <label>Don't see your item? <a href="addItem.html" class="add-item-link">Add it first!</a></label><br><br>
            <label>Pickup Date: </label><br>
            <input type="date" name="pickupDate" required><br><br>
            <label>Preferred Time: </label><br>
            <input type="time" name="preferredTime" required><br><br>
            <label>Pickup Location: </label><br>
            <input type="text" name="pickupLocation" required><br>
            <label>Please provide detailed address including hostel name </label><br><br>
            <label>Additional Notes (Optional): </label><br>
            <textarea name="additionalnotes" rows="4" cols="50"></textarea><br><br>
            <textarea name="pickupinformation" rows="8" cols="50" readonly>Pickup Information

• Pickup service is free for all UTeM students and staff
• We'll confirm your pickup within 24 hours
• Please ensure items are ready at the scheduled time
• You'll earn points once the item is collected</textarea><br><br>

            <div class="button-group">
                <input type="reset" value="Cancel">
                <input type="submit" value="Schedule Pickup">
            </div>
        </form>
    </div>
</body>
</html>
